<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAW</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* === ИЗОЛЯЦИЯ ОТ ТИЛЬДЫ === */
#L { position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;
     background:#0a0a0f!important;color:#f0f0f5!important;z-index:9999!important;
     font-family:'Manrope',sans-serif!important;overflow:hidden!important;margin:0!important;padding:0!important; }
#L *{box-sizing:border-box!important;font-family:'Manrope',sans-serif!important;}
#L button,#L input,#L textarea{all:unset!important;box-sizing:border-box!important;font-family:'Manrope',sans-serif!important;}

/* цвета */
#L{--a:#e03535;--a2:#ff6b35;--s:#13131c;--s2:#1c1c2a;--bd:#2a2a3d;--mt:#6b6b8a;--ok:#4ade80;--er:#f87171;}

/* === ЛОГИН === */
#L .lg{position:absolute!important;inset:0!important;display:flex!important;align-items:flex-start!important;
        justify-content:center!important;overflow-y:auto!important;z-index:10!important;
        background:#0a0a0f!important;transition:opacity .3s,visibility .3s!important;}
#L .lg.h{opacity:0!important;visibility:hidden!important;pointer-events:none!important;}

#L .lbox{background:var(--s)!important;border:1px solid var(--bd)!important;border-radius:20px!important;
          padding:32px 24px!important;width:100%!important;max-width:400px!important;
          margin:24px 16px!important;text-align:center!important;position:relative!important;overflow:hidden!important;}
#L .lbox::before{content:''!important;position:absolute!important;top:0!important;left:0!important;right:0!important;
                  height:3px!important;background:linear-gradient(90deg,var(--a),var(--a2))!important;}

#L .logo{display:block!important;font-family:'Bebas Neue',sans-serif!important;font-size:60px!important;
          letter-spacing:8px!important;color:var(--a)!important;line-height:1!important;margin-bottom:4px!important;}
#L .logo-sub{display:block!important;font-size:11px!important;color:var(--mt)!important;
              letter-spacing:3px!important;text-transform:uppercase!important;margin-bottom:28px!important;}

/* Аккордеон блоков */
#L .blk-acc{margin-bottom:6px!important;border:1px solid var(--bd)!important;border-radius:12px!important;overflow:hidden!important;}
#L .blk-hdr{display:flex!important;align-items:center!important;justify-content:space-between!important;
             padding:14px 18px!important;cursor:pointer!important;background:var(--s2)!important;
             user-select:none!important;transition:background .2s!important;}
#L .blk-hdr:hover{background:rgba(224,53,53,.06)!important;}
#L .blk-hdr.open{background:rgba(224,53,53,.08)!important;border-bottom:1px solid var(--bd)!important;}
#L .blk-title{display:flex!important;flex-direction:column!important;align-items:center!important;
               flex:1!important;text-align:center!important;gap:4px!important;}
#L .blk-badge{background:rgba(224,53,53,.18)!important;color:var(--a)!important;
               padding:3px 12px!important;border-radius:10px!important;font-size:12px!important;
               font-weight:700!important;letter-spacing:1px!important;display:inline-block!important;}
#L .blk-noms{font-size:11px!important;color:var(--mt)!important;letter-spacing:.3px!important;}
#L .blk-chev{color:var(--mt)!important;font-size:14px!important;transition:transform .3s!important;flex-shrink:0!important;}
#L .blk-hdr.open .blk-chev{transform:rotate(180deg)!important;}
#L .blk-body{display:none!important;padding:10px!important;background:#0a0a0f!important;}
#L .blk-acc.open .blk-body{display:block!important;}

/* Кнопки судей */
#L .jbtn{display:flex!important;align-items:center!important;gap:12px!important;width:100%!important;
          background:var(--s2)!important;border:1px solid var(--bd)!important;border-radius:10px!important;
          padding:12px 14px!important;cursor:pointer!important;margin-bottom:8px!important;
          transition:border-color .2s,background .2s!important;text-align:left!important;}
#L .jbtn:last-child{margin-bottom:0!important;}
#L .jbtn:hover{border-color:var(--a)!important;background:rgba(232,197,71,.05)!important;}
#L .jbtn.sel{border-color:var(--a)!important;background:rgba(232,197,71,.1)!important;}
#L .jico{width:36px!important;height:36px!important;background:var(--bd)!important;border-radius:50%!important;
          display:flex!important;align-items:center!important;justify-content:center!important;
          font-size:15px!important;flex-shrink:0!important;}
#L .jn{display:block!important;font-size:14px!important;font-weight:700!important;color:#f0f0f5!important;}
#L .jbtn.sel .jn{color:var(--a)!important;}
#L .jr{display:block!important;font-size:11px!important;color:var(--mt)!important;margin-top:2px!important;}

/* Пин */
#L .pin-lbl{display:block!important;font-size:10px!important;color:var(--mt)!important;
             letter-spacing:2px!important;text-transform:uppercase!important;margin:24px 0 12px!important;}
#L .dots{display:flex!important;justify-content:center!important;gap:12px!important;margin-bottom:18px!important;}
#L .dot{display:block!important;width:14px!important;height:14px!important;border-radius:50%!important;
         background:var(--bd)!important;transition:background .15s,transform .15s!important;}
#L .dot.on{background:var(--a)!important;transform:scale(1.1)!important;}
#L .numpad{display:grid!important;grid-template-columns:repeat(3,1fr)!important;
            gap:8px!important;max-width:210px!important;margin:0 auto 18px!important;}
#L .nk{display:flex!important;align-items:center!important;justify-content:center!important;
        height:52px!important;background:var(--s2)!important;border:1px solid var(--bd)!important;
        border-radius:10px!important;color:#f0f0f5!important;font-size:20px!important;font-weight:600!important;
        cursor:pointer!important;user-select:none!important;transition:background .15s,transform .1s!important;}
#L .nk:hover{background:var(--bd)!important;}
#L .nk:active{transform:scale(.92)!important;}
#L .nk.sm{font-size:13px!important;color:var(--mt)!important;}
#L .err{display:block!important;min-height:18px!important;font-size:12px!important;
         color:var(--er)!important;margin-bottom:10px!important;}
#L .lbtn{display:block!important;width:100%!important;background:var(--a)!important;color:#0a0a0f!important;
          border-radius:10px!important;height:48px!important;line-height:48px!important;
          font-size:14px!important;font-weight:800!important;letter-spacing:.5px!important;
          cursor:pointer!important;text-align:center!important;
          transition:background .2s,transform .2s,opacity .2s!important;}
#L .lbtn:hover{background:#f0d060!important;transform:translateY(-1px)!important;}

/* === APP === */
#L .ap{position:absolute!important;inset:0!important;display:none!important;flex-direction:column!important;z-index:9!important;}
#L .ap.vis{display:flex!important;}

#L .hdr{display:flex!important;align-items:center!important;justify-content:space-between!important;
         padding:0 16px!important;height:54px!important;flex-shrink:0!important;
         background:rgba(10,10,15,.96)!important;border-bottom:1px solid var(--bd)!important;}
#L .hlogo{font-family:'Bebas Neue',sans-serif!important;font-size:26px!important;
           letter-spacing:4px!important;color:var(--a)!important;}
#L .hr{display:flex!important;align-items:center!important;gap:10px!important;}
#L .badge{display:block!important;background:rgba(232,197,71,.12)!important;
           border:1px solid rgba(232,197,71,.3)!important;color:var(--a)!important;
           padding:4px 12px!important;border-radius:20px!important;font-size:11px!important;font-weight:700!important;}
#L .out{display:block!important;border:1px solid var(--bd)!important;color:var(--mt)!important;
         padding:5px 12px!important;border-radius:8px!important;font-size:12px!important;
         cursor:pointer!important;transition:border-color .2s,color .2s!important;}
#L .out:hover{border-color:var(--er)!important;color:var(--er)!important;}

#L .tabs{display:flex!important;padding:0 12px!important;border-bottom:1px solid var(--bd)!important;
          overflow-x:auto!important;flex-shrink:0!important;background:#0a0a0f!important;scrollbar-width:none!important;}
#L .tabs::-webkit-scrollbar{display:none!important;}
#L .tab{display:flex!important;align-items:center!important;gap:6px!important;background:none!important;
         border:none!important;border-bottom:2px solid transparent!important;color:var(--mt)!important;
         padding:12px 14px!important;font-size:13px!important;font-weight:600!important;
         white-space:nowrap!important;cursor:pointer!important;margin-bottom:-1px!important;
         transition:color .2s!important;}
#L .tab:hover{color:#f0f0f5!important;}
#L .tab.act{color:var(--a)!important;border-bottom-color:var(--a)!important;}
#L .tdot{display:inline-block!important;width:6px!important;height:6px!important;border-radius:50%!important;background:var(--bd)!important;}
#L .tdot.dn{background:var(--ok)!important;}
#L .tdot.pt{background:var(--a)!important;}

#L .scrl{flex:1!important;overflow-y:auto!important;padding:18px 14px!important;
          scrollbar-width:thin!important;scrollbar-color:var(--bd) transparent!important;}

/* Карточка команды */
#L .nhdr{display:flex!important;align-items:center!important;justify-content:space-between!important;margin-bottom:14px!important;}
#L .ntitle{font-family:'Bebas Neue',sans-serif!important;font-size:28px!important;letter-spacing:2px!important;}
#L .ncnt{font-size:11px!important;color:var(--mt)!important;background:var(--s2)!important;
          border:1px solid var(--bd)!important;padding:4px 12px!important;border-radius:20px!important;}

#L .card{background:var(--s)!important;border:1px solid var(--bd)!important;
          border-radius:14px!important;margin-bottom:10px!important;overflow:hidden!important;
          transition:border-color .2s!important;}
#L .card.sc{border-color:rgba(74,222,128,.35)!important;}
#L .chead{display:flex!important;align-items:center!important;padding:14px 16px!important;
           cursor:pointer!important;gap:10px!important;user-select:none!important;}
#L .chead:hover{background:rgba(255,255,255,.02)!important;}
#L .cnum{font-family:'Bebas Neue',sans-serif!important;font-size:26px!important;color:var(--bd)!important;min-width:32px!important;}
#L .cnm{flex:1!important;}
#L .cnm-m{display:block!important;font-size:15px!important;font-weight:700!important;}
#L .tap{display:block!important;font-size:10px!important;color:var(--mt)!important;margin-top:2px!important;}
#L .card.open .tap,#L .card.sc .tap{display:none!important;}
#L .cprev{font-family:'Bebas Neue',sans-serif!important;font-size:24px!important;color:var(--bd)!important;
           min-width:48px!important;text-align:right!important;}
#L .cprev.h{color:var(--a)!important;}
#L .chev{color:var(--mt)!important;font-size:14px!important;transition:transform .3s!important;flex-shrink:0!important;}
#L .card.open .chev{transform:rotate(180deg)!important;}

#L .cbody{display:none!important;padding:0 14px 18px!important;border-top:1px solid var(--bd)!important;}
#L .card.open .cbody{display:block!important;animation:sd .22s ease!important;}
@keyframes sd{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

/* Критерии — БЕЗ СЛАЙДЕРА */
#L .cgrid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:10px!important;margin:14px 0!important;}
@media(max-width:480px){#L .cgrid{grid-template-columns:1fr!important;}}

#L .crit{background:var(--s2)!important;border:1px solid var(--bd)!important;border-radius:12px!important;padding:12px!important;}
#L .crith{display:flex!important;align-items:center!important;justify-content:space-between!important;margin-bottom:10px!important;}
#L .critn{font-size:11px!important;text-transform:uppercase!important;letter-spacing:1.5px!important;color:var(--mt)!important;font-weight:600!important;}
#L .critw{font-size:10px!important;color:var(--a)!important;background:rgba(232,197,71,.1)!important;padding:2px 8px!important;border-radius:10px!important;}

/* Большие кнопки − число + */
#L .sctrl{display:flex!important;align-items:center!important;gap:8px!important;margin-bottom:10px!important;}
#L .stp{width:44px!important;height:56px!important;flex-shrink:0!important;
         display:flex!important;align-items:center!important;justify-content:center!important;
         background:#0a0a0f!important;border:1px solid var(--bd)!important;border-radius:10px!important;
         color:#f0f0f5!important;font-size:26px!important;font-weight:300!important;
         cursor:pointer!important;user-select:none!important;
         transition:border-color .15s,color .15s,transform .1s!important;}
#L .stp:hover{border-color:var(--a)!important;color:var(--a)!important;}
#L .stp:active{transform:scale(.88)!important;}

#L .nwrap{flex:1!important;position:relative!important;}
#L .ninp{display:block!important;width:100%!important;height:56px!important;
          background:#0a0a0f!important;border:2px solid var(--bd)!important;border-radius:10px!important;
          color:#f0f0f5!important;font-family:'Bebas Neue',sans-serif!important;
          font-size:34px!important;text-align:center!important;outline:none!important;
          cursor:text!important;transition:border-color .2s,color .2s!important;
          -moz-appearance:textfield!important;appearance:textfield!important;
          padding:0!important;margin:0!important;line-height:56px!important;}
#L .ninp::-webkit-outer-spin-button,
#L .ninp::-webkit-inner-spin-button{display:none!important;}
#L .ninp:focus{border-color:var(--a)!important;box-shadow:0 0 0 3px rgba(232,197,71,.12)!important;}
#L .ninp.hi{border-color:rgba(74,222,128,.6)!important;color:var(--ok)!important;}
#L .ninp.md{border-color:rgba(232,197,71,.6)!important;color:var(--a)!important;}
#L .ninp.lo{border-color:rgba(248,113,113,.5)!important;color:var(--er)!important;}
#L .nmx{position:absolute!important;bottom:5px!important;right:8px!important;
         font-size:9px!important;color:var(--mt)!important;pointer-events:none!important;}

/* Быстрые кнопки */
#L .qrow{display:flex!important;flex-wrap:wrap!important;gap:4px!important;}
#L .qb{background:#0a0a0f!important;border:1px solid var(--bd)!important;color:var(--mt)!important;
        padding:5px 8px!important;border-radius:6px!important;font-size:12px!important;font-weight:600!important;
        cursor:pointer!important;transition:border-color .15s,color .15s!important;}
#L .qb:hover{border-color:var(--a)!important;color:var(--a)!important;}

/* Итог */
#L .totrow{display:flex!important;align-items:center!important;justify-content:space-between!important;
            background:#0a0a0f!important;border:1px solid var(--bd)!important;border-radius:10px!important;
            padding:10px 14px!important;margin-bottom:14px!important;}
#L .totl{display:block!important;font-size:11px!important;color:var(--mt)!important;text-transform:uppercase!important;letter-spacing:1px!important;}
#L .totf{display:block!important;font-size:10px!important;color:var(--bd)!important;margin-top:3px!important;}
#L .totv{font-family:'Bebas Neue',sans-serif!important;font-size:30px!important;color:var(--a)!important;}

#L .clbl{display:block!important;font-size:10px!important;text-transform:uppercase!important;
          letter-spacing:1.5px!important;color:var(--mt)!important;font-weight:600!important;margin-bottom:7px!important;}
#L .ctxt{display:block!important;width:100%!important;background:var(--s2)!important;
          border:1px solid var(--bd)!important;border-radius:10px!important;color:#f0f0f5!important;
          padding:10px 12px!important;font-size:13px!important;resize:vertical!important;
          min-height:68px!important;outline:none!important;line-height:1.5!important;margin:0!important;
          transition:border-color .2s!important;}
#L .ctxt:focus{border-color:var(--a)!important;}
#L .ctxt::placeholder{color:var(--mt)!important;}

#L .savbtn{display:flex!important;align-items:center!important;gap:8px!important;
            background:var(--a)!important;color:#0a0a0f!important;border-radius:10px!important;
            padding:12px 22px!important;font-size:13px!important;font-weight:700!important;
            cursor:pointer!important;margin-top:12px!important;margin-left:auto!important;
            transition:background .2s,transform .2s!important;}
#L .savbtn:hover{background:#f0d060!important;transform:translateY(-1px)!important;}
#L .savbtn.sv{background:var(--ok)!important;}

/* Сабмит */
#L .subbox{background:var(--s)!important;border:1px solid var(--bd)!important;
            border-radius:14px!important;padding:22px!important;margin-top:20px!important;text-align:center!important;}
#L .subt{display:block!important;font-family:'Bebas Neue',sans-serif!important;font-size:22px!important;letter-spacing:2px!important;margin-bottom:6px!important;}
#L .subs{display:block!important;font-size:13px!important;color:var(--mt)!important;margin-bottom:12px!important;}
#L .prog{background:var(--bd)!important;border-radius:4px!important;height:5px!important;margin-bottom:14px!important;overflow:hidden!important;}
#L .progf{height:100%!important;background:linear-gradient(90deg,var(--a),var(--a2))!important;border-radius:4px!important;transition:width .5s!important;}
#L .subbtn{display:inline-block!important;background:linear-gradient(135deg,var(--a),var(--a2))!important;
            color:#0a0a0f!important;border-radius:12px!important;padding:13px 36px!important;
            font-size:14px!important;font-weight:800!important;cursor:pointer!important;
            transition:transform .2s,box-shadow .2s,opacity .2s!important;}
#L .subbtn:hover{transform:translateY(-2px)!important;box-shadow:0 8px 24px rgba(232,197,71,.3)!important;}
#L .subbtn.dis{opacity:.4!important;cursor:not-allowed!important;transform:none!important;box-shadow:none!important;}

/* Done */
#L .done{display:none!important;text-align:center!important;padding:56px 20px!important;}
#L .done.vis{display:block!important;}
#L .done-i{display:block!important;font-size:52px!important;margin-bottom:14px!important;}
#L .done-t{display:block!important;font-family:'Bebas Neue',sans-serif!important;font-size:30px!important;letter-spacing:3px!important;color:var(--ok)!important;margin-bottom:8px!important;}
#L .done-s{font-size:13px!important;color:var(--mt)!important;line-height:1.6!important;}

/* Toast */
#L .toast{position:fixed!important;bottom:18px!important;right:14px!important;
           background:var(--s)!important;border:1px solid var(--bd)!important;
           border-radius:12px!important;padding:11px 16px!important;font-size:13px!important;font-weight:500!important;
           z-index:99999!important;transform:translateY(80px)!important;opacity:0!important;
           transition:all .3s!important;max-width:280px!important;
           display:flex!important;align-items:center!important;gap:8px!important;pointer-events:none!important;}
#L .toast.show{transform:translateY(0)!important;opacity:1!important;}
#L .toast.ok{border-color:rgba(74,222,128,.4)!important;}
</style>
</head>
<body>
<div id="L">

  <!-- ══════════ ЛОГИН ══════════ -->
  <div class="lg" id="lgn">
    <div class="lbox">
      <img src="https://i.ibb.co/0p0Dk0k8/Chat-GPT-Image-30-2026-23-47-28.png"
           style="width:160px!important;margin:0 auto 8px!important;display:block!important;object-fit:contain!important;">
      <span class="logo-sub">Панель судьи</span>

      <div class="jbtn" onclick="selJ(0)"><div class="jico">⚖️</div><div><span class="jn">Деки</span><span class="jr">Судья</span></div></div>
      <div class="jbtn" onclick="selJ(1)"><div class="jico">⚖️</div><div><span class="jn">Полли Оричи</span><span class="jr">Судья</span></div></div>
      <div class="jbtn" onclick="selJ(2)"><div class="jico">⚖️</div><div><span class="jn">Олег Клевакин</span><span class="jr">Судья</span></div></div>
      <div class="jbtn" onclick="selJ(3)"><div class="jico">⚖️</div><div><span class="jn">Coco</span><span class="jr">Судья</span></div></div>

      <!-- Пин -->
      <span class="pin-lbl">Введите пин-код</span>
      <div class="dots">
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
      <div class="numpad">
        <div class="nk" onclick="np(1)">1</div><div class="nk" onclick="np(2)">2</div><div class="nk" onclick="np(3)">3</div>
        <div class="nk" onclick="np(4)">4</div><div class="nk" onclick="np(5)">5</div><div class="nk" onclick="np(6)">6</div>
        <div class="nk" onclick="np(7)">7</div><div class="nk" onclick="np(8)">8</div><div class="nk" onclick="np(9)">9</div>
        <div class="nk sm" onclick="nd()">⌫</div><div class="nk" onclick="np(0)">0</div><div class="nk sm" onclick="nc()">CLR</div>
      </div>
      <span class="err" id="er"></span>
      <div class="lbtn" id="lbtn" onclick="doLogin()" style="opacity:.35;cursor:not-allowed">Войти</div>
    </div>
  </div>

  <!-- ══════════ APP ══════════ -->
  <div class="ap" id="ap">
    <div class="hdr">
      <img src="https://i.ibb.co/0p0Dk0k8/Chat-GPT-Image-30-2026-23-47-28.png"
           style="height:36px!important;object-fit:contain!important;display:block!important;">
      <div class="hr">
        <span class="badge" id="jlbl">Судья</span>
        <div class="out" onclick="doLogout()">Выйти</div>
        <div class="out" onclick="clearAll()" style="border-color:#555!important;color:#888!important;font-size:11px!important;">Сброс</div>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="scrl" id="scrl">
      <div id="teams"></div>
      <div id="submit"></div>
      <div class="done" id="done">
        <span class="done-i">✅</span>
        <span class="done-t">Оценки отправлены!</span>
        <span class="done-s">Оценки сохранены.<br>Переключитесь на другую номинацию.</span>
      </div>
    </div>
  </div>

  <div class="toast" id="tst"><span id="ti"></span><span id="tm"></span></div>
</div>

<!-- Firebase compat SDK (работает без модулей) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({

<script>
// ══ CONFIG ══
const C = {

  ],

      'Давыдова Эвелина','Бутко Мария','Улыбина Татьяна','Бернадская Анна','Терещенко София',
      'Еремеева Маргарита','Кузóра Карина','Наимова Виктория','Шахова София','Грабежева Жанна',

      'Окутина Мария','Гайфутдинова Валерия','Зотова Валерия','Григорьева Алиса','Мельникова Кристина',
      'Бондарева Дарья','Мартынова Кристина','Лавриненко Екатерина','Афанасьева Екатерина','Нафикова Алина',
      'Дмитриева Ирина','Маркитан Анастасия','Ким Александра','Казеннова Юлия','Бондарь Анна',
      'Кугаевская Елизавета','Никулина Анна','Бильсон Анастасия','Пинчук Валерия','Дёмена Анастасия',

    {id:'solo_frame', name:'Solo Frame Up', critType:'solo', block:1, teams:[
      'Лебедева Анастасия','Мирошникова Юлия','Cherrnuha','Пашкова Алиса','Цвиркун Дарья',
      'Кукава Эльвира','Новикова Полина','Климова Валерия','Литвякова Анна','Лихачёва Александра',
      'Захарова Наталья','Дубовицкая Софья','Еремеева Ирина','Лященко Валерия','Алина Gloom',
      'Илана Исакова','Некрасова Марина','Костина Юлия','Котюх Александра','Цимбалюк Полина',
      'Корниенко Анастасия','Рыжонкова Любовь',
    ]},
    {id:'solo_pro', name:'Solo Pro', critType:'solo', block:1, teams:[
      'Мельникова Дарья','Ситора','Ловякина Елизавета','Клок Маргарита','Красова Дарья',
      'Яковлева Алина','Полякова Александра','Соколикова Александра','Осетрова Татьяна','Абрамова Александра',
      'Фатеева Анастасия','Корсикова Анастасия','Парыгина Алёна','Чистякова Ксения','Зуб Евгения',
      'Баранова Елизавета','Приставка Екатерина','Милая Анастасия','Клёнова Полина','Сухова София',
      'Демко Юлия','Мощенко Александра','Астанина Ева','Зарубкина Дарья','Глебова Юлия',
      'Лотник Ксения','Молочко Татьяна','Болотникова Юлия','Син Инна','Трубникова Кристина',
      'Корчагина Люсьена','Перчак Диана','Ахмякова Анастасия','Удельнов Василий','Казакова Алина',
      'Кислюк Александра','Прибылова Елизавета','Тимирбаева Диана','Несмиянова Юля','Анищик Лада',
      'Падей Екатерина','Пылаева Алена','Черных Анастасия','Самсонова Виктория','Шитикова Виктория',
      'Сульковская Ирина','Мацак Кристина','Быстрова Арина','Зыбина Елизавета','Керова Ксения',
      'Сидякина Анна','Корниенко Анастасия','Морозова Дарья','Букина Арина','Киселёва Мария',
      'Смирнова Екатерина','Цыганкова Аня',
    ]},
    {id:'mini_crew', name:'Mini Crew', critType:'crew', block:1, teams:[
      'Nornir','Цукерочки','AVA','Bullet','LAVDO',
      'Каблучный сбор','MAIDENS','dolls','DONNA','@vkravtsova1',
      'LYNX','Dich Art Group','ViVibes','VI','NG','KITCH',
    ]},
  ],
};

// ══ STATE ══
let ji=null, ni=0, pin='', sc={}, sub={};

function ld(){
  // Слушаем scores и submitted из Firebase
  db.ref('scores').on('value', snap=>{ sc = snap.val()||{}; });
  db.ref('submitted').on('value', snap=>{
    sub = snap.val()||{};
    if(ji!==null){ rTabs(); rNom(); }
  });
}

function sv(){
  db.ref('scores').set(sc);
  db.ref('submitted').set(sub);
}
function gs(j,nid,t){return sc?.[j]?.[nid]?.[t]||{technique:5,musicality:5,choreo:5,appearance:5,comment:'',saved:false};}
function ss(j,nid,t,f,v){if(!sc[j])sc[j]={};if(!sc[j][nid])sc[j][nid]={};if(!sc[j][nid][t])sc[j][nid][t]={technique:5,musicality:5,choreo:5,appearance:5,comment:'',saved:false};sc[j][nid][t][f]=v;sc[j][nid][t].saved=false;sv();}
function getCrit(nomIdx){const nom=C.noms[nomIdx];return nom.critType==='crew'?C.critCrew:C.critSolo;}
function wt(s,nomIdx){return getCrit(nomIdx).reduce((a,c)=>a+(parseFloat(s[c.k])||0)*c.w,0);}
function cc(v){v=parseFloat(v);return v>=8?'hi':v>=6?'md':'lo';}

// ══ ЛОГИН ══
function selJ(i){
  ji=i;
  document.querySelectorAll('#L .jbtn').forEach((b,bi)=>b.classList.toggle('sel',bi===i));
  pin='';ud();cb();document.getElementById('er').textContent='';
}
function np(n){if(ji===null){document.getElementById('er').textContent='Выберите судью';return;}if(pin.length<4){pin+=String(n);ud();if(pin.length===4)cb();}}
function nd(){pin=pin.slice(0,-1);ud();cb();}
function nc(){pin='';ud();cb();}
function ud(){for(let i=0;i<4;i++)document.getElementById('d'+i).classList.toggle('on',i<pin.length);}
function cb(){const ok=ji!==null&&pin.length===4;const b=document.getElementById('lbtn');b.style.opacity=ok?'1':'0.35';b.style.cursor=ok?'pointer':'not-allowed';}
function doLogin(){
  if(ji===null||pin.length<4)return;
  if(String(pin)===String(C.judges[ji].pin)){
    document.getElementById('lgn').classList.add('h');
    document.getElementById('ap').classList.add('vis');
    document.getElementById('jlbl').textContent=C.judges[ji].name;
    ni=C.noms.findIndex(n=>n.block===C.judges[ji].block);
    if(ni<0)ni=0;
    rTabs();rNom();
  } else {
    document.getElementById('er').textContent='Неверный пин-код';
    pin='';ud();cb();
    const bx=document.querySelector('#L .lbox');
    bx.style.transform='translateX(-8px)';
    setTimeout(()=>bx.style.transform='',300);
  }
}
function doLogout(){
  ji=null;pin='';
  document.getElementById('lgn').classList.remove('h');
  document.getElementById('ap').classList.remove('vis');
  document.querySelectorAll('#L .jbtn').forEach(b=>b.classList.remove('sel'));
  ud();cb();
}

// ══ ТАБЫ ══
function rTabs(){
  const blk=C.judges[ji].block;
  const t=document.getElementById('tabs');t.innerHTML='';
  C.noms.forEach((nom,i)=>{
    if(nom.block!==blk)return;
    const dn=sub?.[ji]?.[nom.id]===true;
    const pt=Object.values(sc?.[ji]?.[nom.id]||{}).some(s=>s.saved);
    const btn=document.createElement('div');
    btn.className='tab'+(i===ni?' act':'');
    btn.innerHTML=`${nom.name}<span class="tdot ${dn?'dn':pt?'pt':''}"></span>`;
    btn.onclick=()=>{ni=i;rTabs();rNom();};
    t.appendChild(btn);
  });
}

// ══ НОМИНАЦИЯ ══
function rNom(){
  const nom=C.noms[ni];
  const dn=sub?.[ji]?.[nom.id]===true;
  document.getElementById('done').classList.toggle('vis',dn);
  document.getElementById('teams').style.display=dn?'none':'';
  document.getElementById('submit').style.display=dn?'none':'';
  document.getElementById('scrl').scrollTop=0;
  if(dn)return;

  const el=document.getElementById('teams');
  el.innerHTML=`<div class="nhdr"><span class="ntitle">${nom.name}</span><span class="ncnt">${nom.teams.length} участников</span></div>`;

  nom.teams.forEach((team,tIdx)=>{
    const s=gs(ji,nom.id,tIdx);
    const crit=getCrit(ni);
    const w=wt(s,ni);
    const isCrew=nom.critType==='crew';
    const formula=isCrew
      ?'20% техника + 25% муз.+синхрон + 35% хореог.+рисунки + 20% внеш.вид'
      :'35% техника + 25% музыкальность + 35% хореография + 5% внешний вид';
    const card=document.createElement('div');
    card.className='card'+(s.saved?' sc':'');
    card.id='c'+tIdx;

    card.innerHTML=`
      <div class="chead" onclick="tog(${tIdx})">
        <span class="cnum">${String(tIdx+1).padStart(2,'0')}</span>
        <div class="cnm"><span class="cnm-m">${team}</span><span class="tap">нажми для оценки</span></div>
        <span class="cprev${s.saved?' h':''}">${s.saved?w.toFixed(2):'—'}</span>
        <span class="chev">▾</span>
      </div>
      <div class="cbody">
        <div class="cgrid">
          ${crit.map(c=>`
            <div class="crit">
              <div class="crith"><span class="critn">${c.l}</span><span class="critw">${Math.round(c.w*100)}%</span></div>
              <div class="sctrl">
                <div class="stp" onclick="stp(${tIdx},'${c.k}',-0.5)">−</div>
                <div class="nwrap">
                  <input type="number" class="ninp ${cc(s[c.k])}" id="ni_${tIdx}_${c.k}"
                    min="0" max="10" step="0.5" value="${parseFloat(s[c.k]||5).toFixed(1)}"
                    oninput="oi(${tIdx},'${c.k}',this.value)"
                    onblur="ob(${tIdx},'${c.k}',this.value)">
                  <span class="nmx">/10</span>
                </div>
                <div class="stp" onclick="stp(${tIdx},'${c.k}',+0.5)">+</div>
              </div>
              <div class="qrow">
                ${[5,6,7,7.5,8,8.5,9,9.5,10].map(v=>`<div class="qb" onclick="qs(${tIdx},'${c.k}',${v})">${v}</div>`).join('')}
              </div>
            </div>`).join('')}
        </div>
        <div class="totrow">
          <div><span class="totl">Итоговый балл</span><span class="totf">${formula}</span></div>
          <span class="totv" id="tv${tIdx}">${w.toFixed(3)}</span>
        </div>
        <span class="clbl">Комментарий судьи (виден залу)</span>
        <textarea class="ctxt" id="cm${tIdx}" placeholder="Комментарий к выступлению..."
          oninput="ss(ji,'${nom.id}',${tIdx},'comment',this.value)">${s.comment}</textarea>
        <div class="savbtn${s.saved?' sv':''}" id="sb${tIdx}" onclick="savT(${tIdx})">
          ${s.saved?'✓ Сохранено':'💾 Сохранить'}
        </div>
      </div>`;

    el.appendChild(card);
    if(tIdx===0)card.classList.add('open');
  });
  rSub(nom);
}

function rSub(nom){
  const saved=Object.values(sc?.[ji]?.[nom.id]||{}).filter(s=>s.saved).length;
  const tot=nom.teams.length, pct=Math.round(saved/tot*100);
  const nomI=C.noms.indexOf(nom);
  const isSubmitted=sub?.[ji]?.[nom.id]===true;
  document.getElementById('submit').innerHTML=`
    <div class="subbox">
      <span class="subt">Отправить оценки</span>
      <span class="subs">Оценено ${saved} из ${tot} ${isSubmitted?'· <span style="color:var(--ok)">✓ отправлено</span>':''}</span>
      <div class="prog"><div class="progf" style="width:${pct}%"></div></div>
      <div class="subbtn" onclick="subNom(${nomI})">
        ${isSubmitted?'🔄 Переотправить оценки':'✓ Отправить оценки'}
      </div>
    </div>`;
}

function tog(t){document.getElementById('c'+t).classList.toggle('open');}

function stp(t,k,d){
  const inp=document.getElementById('ni_'+t+'_'+k);
  let v=parseFloat(inp.value)||5;
  v=Math.min(10,Math.max(0,Math.round((v+d)*2)/2));
  inp.value=v.toFixed(1);oi(t,k,v);
}
function oi(t,k,raw){
  const v=parseFloat(raw);if(isNaN(v))return;
  const cl=Math.min(10,Math.max(0,v));
  ss(ji,C.noms[ni].id,t,k,cl);
  const inp=document.getElementById('ni_'+t+'_'+k);
  if(inp)inp.className='ninp '+cc(cl);
  document.getElementById('tv'+t).textContent=wt(gs(ji,C.noms[ni].id,t),ni).toFixed(3);
  document.getElementById('sb'+t).className='savbtn';
  document.getElementById('sb'+t).textContent='💾 Сохранить';
  document.getElementById('c'+t).classList.remove('sc');
}
function ob(t,k,raw){
  let v=parseFloat(raw);if(isNaN(v))v=5;
  v=Math.round(Math.min(10,Math.max(0,v))*2)/2;
  const inp=document.getElementById('ni_'+t+'_'+k);
  if(inp)inp.value=v.toFixed(1);oi(t,k,v);
}
function qs(t,k,val){
  const inp=document.getElementById('ni_'+t+'_'+k);
  if(inp)inp.value=parseFloat(val).toFixed(1);oi(t,k,val);
}
function savT(t){
  const nom=C.noms[ni];
  const cm=document.getElementById('cm'+t);
  if(cm&&sc[ji]?.[nom.id]?.[t])sc[ji][nom.id][t].comment=cm.value;
  if(sc[ji]?.[nom.id]?.[t])sc[ji][nom.id][t].saved=true;
  sv();
  const card=document.getElementById('c'+t);card.classList.add('sc');
  const sb=document.getElementById('sb'+t);sb.className='savbtn sv';sb.textContent='✓ Сохранено';
  const s=gs(ji,nom.id,t);
  card.querySelector('.cprev').textContent=wt(s,ni).toFixed(2);
  card.querySelector('.cprev').className='cprev h';
  rSub(nom);toast('✅',`"${nom.teams[t]}" сохранено`);
}
function subNom(nomI){
  const nom=C.noms[nomI];
  if(!sub[ji])sub[ji]={};
  sub[ji][nom.id]=true;
  sv();rTabs();rNom();toast('🏆','Оценки отправлены!');
}
function toast(ico,msg){
  const t=document.getElementById('tst');
  t.className='toast ok';
  document.getElementById('ti').textContent=ico;
  document.getElementById('tm').textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

function clearAll(){
  const pass = prompt('Введите админский пароль:');
  if(pass !== 'law2026') { toast('❌','Неверный пароль'); return; }
  if(!confirm('Очистить ВСЕ данные? Оценки всех судей будут удалены.')) return;
  db.ref('scores').set(null);
  db.ref('submitted').set(null);
  db.ref('published').set(null);
  sc={}; sub={};
  rTabs(); rNom();
  toast('🗑','Все данные очищены');
}

ld();
</script>
