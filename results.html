<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAW — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
#R,#R*{box-sizing:border-box!important;font-family:'Manrope',sans-serif!important;}
#R{
  --a:#e03535;--a2:#ff6b35;--s:#13131c;--s2:#1c1c2a;--bd:#2a2a3d;
  --mt:#6b6b8a;--ok:#4ade80;--gold:#FFD700;--silv:#C0C0C0;--brnz:#CD7F32;
  position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;
  background:#0a0a0f!important;color:#f0f0f5!important;z-index:9999!important;
  overflow:hidden!important;display:flex!important;flex-direction:column!important;
}
#R button,#R input,#R textarea{all:unset!important;box-sizing:border-box!important;font-family:'Manrope',sans-serif!important;}

/* BG */
#R .bg{position:fixed!important;inset:0!important;pointer-events:none!important;z-index:0!important;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(224,53,53,.09) 0%,transparent 60%),
    radial-gradient(ellipse 40% 50% at 10% 85%,rgba(255,107,53,.05) 0%,transparent 60%)!important;}

/* ── LOGO HEADER ── */
#R .logo-wrap{
  display:flex!important;flex-direction:column!important;align-items:center!important;
  justify-content:center!important;padding:24px 20px 12px!important;
  flex-shrink:0!important;z-index:2!important;position:relative!important;
  border-bottom:1px solid var(--bd)!important;
  background:rgba(10,10,15,.96)!important;
}
#R .logo-img{height:220px!important;object-fit:contain!important;display:block!important;margin-bottom:0!important;}
#R .logo-sub{
  font-size:10px!important;color:var(--mt)!important;letter-spacing:4px!important;
  text-transform:uppercase!important;margin-top:6px!important;display:block!important;
}
#R .hright{
  position:absolute!important;right:16px!important;top:50%!important;transform:translateY(-50%)!important;
  display:flex!important;align-items:center!important;gap:8px!important;
}
#R .live{display:flex!important;align-items:center!important;gap:6px!important;
  background:rgba(248,113,113,.12)!important;border:1px solid rgba(248,113,113,.3)!important;
  color:#f87171!important;padding:4px 12px!important;border-radius:20px!important;
  font-size:11px!important;font-weight:700!important;letter-spacing:1px!important;}
#R .ldot{width:7px!important;height:7px!important;border-radius:50%!important;background:#f87171!important;
  animation:lp 1.5s ease-in-out infinite!important;}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
#R .fsbtn{background:var(--s2)!important;border:1px solid var(--bd)!important;color:var(--mt)!important;
  padding:5px 12px!important;border-radius:8px!important;cursor:pointer!important;
  font-size:11px!important;transition:all .2s!important;}
#R .fsbtn:hover{border-color:var(--a)!important;color:var(--a)!important;}

/* ── TABS ── */
#R .tabs{display:flex!important;padding:0 16px!important;border-bottom:1px solid var(--bd)!important;
  flex-shrink:0!important;background:#0a0a0f!important;overflow-x:auto!important;
  scrollbar-width:none!important;z-index:2!important;}
#R .tabs::-webkit-scrollbar{display:none!important;}
#R .tab{background:none!important;border:none!important;border-bottom:2px solid transparent!important;
  color:var(--mt)!important;padding:12px 16px!important;font-size:13px!important;font-weight:600!important;
  white-space:nowrap!important;cursor:pointer!important;margin-bottom:-1px!important;transition:color .2s!important;}
#R .tab:hover{color:#f0f0f5!important;}
#R .tab.act{color:var(--a)!important;border-bottom-color:var(--a)!important;}

/* ── SCROLL ── */
#R .main{flex:1!important;overflow-y:auto!important;padding:28px 20px 40px!important;z-index:1!important;
  scrollbar-width:thin!important;scrollbar-color:var(--bd) transparent!important;}
#R .main::-webkit-scrollbar{width:3px!important;}
#R .main::-webkit-scrollbar-thumb{background:var(--bd)!important;border-radius:2px!important;}

/* ── NOM HEADER ── */
#R .srow{display:flex!important;align-items:center!important;justify-content:space-between!important;
  margin-bottom:10px!important;flex-wrap:wrap!important;gap:8px!important;}
#R .ntitle{font-family:'Bebas Neue',sans-serif!important;font-size:32px!important;letter-spacing:3px!important;}
#R .jpills{display:flex!important;gap:6px!important;flex-wrap:wrap!important;}
#R .pill{display:flex!important;align-items:center!important;gap:5px!important;padding:4px 10px!important;
  border-radius:20px!important;font-size:11px!important;font-weight:600!important;border:1px solid!important;}
#R .pill.dn{background:rgba(74,222,128,.08)!important;border-color:rgba(74,222,128,.3)!important;color:var(--ok)!important;}
#R .pill.wt{background:rgba(107,107,138,.1)!important;border-color:var(--bd)!important;color:var(--mt)!important;}
#R .pdot{width:5px!important;height:5px!important;border-radius:50%!important;background:currentColor!important;}

/* criteria badges */
#R .crit-info{display:flex!important;gap:6px!important;flex-wrap:wrap!important;margin-bottom:24px!important;}
#R .cb{background:var(--s2)!important;border:1px solid var(--bd)!important;border-radius:8px!important;
  padding:4px 10px!important;font-size:11px!important;color:var(--mt)!important;}
#R .cb span{color:var(--a)!important;font-weight:700!important;}

/* ── PODIUM ── */
#R .podium-wrap{
  display:flex!important;align-items:flex-end!important;justify-content:center!important;
  gap:0!important;margin-bottom:40px!important;
}

#R .pod{
  display:flex!important;flex-direction:column!important;align-items:center!important;
  position:relative!important;
}

/* Card above podium */
#R .pod-card{
  border-radius:14px!important;padding:20px 16px 16px!important;text-align:center!important;
  border:1px solid!important;position:relative!important;overflow:hidden!important;
  width:220px!important;margin-bottom:-1px!important;
  transition:transform .3s!important;
}
#R .pod-card:hover{transform:translateY(-4px)!important;}

#R .pod.first .pod-card{
  background:linear-gradient(160deg,rgba(255,215,0,.15),rgba(255,215,0,.04))!important;
  border-color:rgba(255,215,0,.5)!important;
  animation:riseIn .6s ease .05s both!important;
  width:260px!important;
}
#R .pod.second .pod-card{
  background:linear-gradient(160deg,rgba(192,192,192,.12),rgba(192,192,192,.03))!important;
  border-color:rgba(192,192,192,.35)!important;
  animation:riseIn .6s ease .15s both!important;
}
#R .pod.third .pod-card{
  background:linear-gradient(160deg,rgba(205,127,50,.12),rgba(205,127,50,.03))!important;
  border-color:rgba(205,127,50,.35)!important;
  animation:riseIn .6s ease .25s both!important;
}
@keyframes riseIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

/* Place number badge */
#R .place-badge{
  width:40px!important;height:40px!important;border-radius:50%!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  font-family:'Bebas Neue',sans-serif!important;font-size:20px!important;
  margin:0 auto 12px!important;border:2px solid!important;
}
#R .pod.first .place-badge{background:rgba(255,215,0,.15)!important;border-color:var(--gold)!important;color:var(--gold)!important;}
#R .pod.second .place-badge{background:rgba(192,192,192,.1)!important;border-color:var(--silv)!important;color:var(--silv)!important;}
#R .pod.third .place-badge{background:rgba(205,127,50,.1)!important;border-color:var(--brnz)!important;color:var(--brnz)!important;}

#R .pod-name{
  font-size:14px!important;font-weight:800!important;margin-bottom:10px!important;
  line-height:1.2!important;
}
#R .pod.first .pod-name{color:var(--gold)!important;font-size:16px!important;}
#R .pod.second .pod-name{color:var(--silv)!important;}
#R .pod.third .pod-name{color:var(--brnz)!important;}

#R .pod-score{
  font-family:'Bebas Neue',sans-serif!important;font-size:36px!important;line-height:1!important;
}
#R .pod.first .pod-score{color:var(--gold)!important;font-size:44px!important;}
#R .pod.second .pod-score{color:var(--silv)!important;}
#R .pod.third .pod-score{color:var(--brnz)!important;}

#R .pod-lbl{font-size:10px!important;color:var(--mt)!important;letter-spacing:1px!important;
  text-transform:uppercase!important;margin-top:2px!important;display:block!important;}

/* Glow line at bottom of card */
#R .pod-glow{
  position:absolute!important;bottom:0!important;left:0!important;right:0!important;height:2px!important;
}
#R .pod.first .pod-glow{background:linear-gradient(90deg,transparent,var(--gold),transparent)!important;}
#R .pod.second .pod-glow{background:linear-gradient(90deg,transparent,var(--silv),transparent)!important;}
#R .pod.third .pod-glow{background:linear-gradient(90deg,transparent,var(--brnz),transparent)!important;}

/* Podium platform */
#R .platform{
  width:100%!important;display:flex!important;align-items:flex-end!important;
  justify-content:center!important;
}
#R .plat-block{
  border-radius:6px 6px 0 0!important;width:100%!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  font-family:'Bebas Neue',sans-serif!important;font-size:11px!important;letter-spacing:2px!important;
}
#R .pod.first .plat-block{
  height:80px!important;
  background:linear-gradient(180deg,rgba(255,215,0,.18),rgba(255,215,0,.06))!important;
  border:1px solid rgba(255,215,0,.3)!important;color:rgba(255,215,0,.5)!important;
  animation:riseIn .5s ease .3s both!important;
}
#R .pod.second .plat-block{
  height:50px!important;
  background:linear-gradient(180deg,rgba(192,192,192,.12),rgba(192,192,192,.04))!important;
  border:1px solid rgba(192,192,192,.2)!important;color:rgba(192,192,192,.4)!important;
  animation:riseIn .5s ease .4s both!important;
}
#R .pod.third .plat-block{
  height:30px!important;
  background:linear-gradient(180deg,rgba(205,127,50,.12),rgba(205,127,50,.04))!important;
  border:1px solid rgba(205,127,50,.2)!important;color:rgba(205,127,50,.4)!important;
  animation:riseIn .5s ease .5s both!important;
}

/* ── TABLE ── */
#R .sec{font-family:'Bebas Neue',sans-serif!important;font-size:16px!important;letter-spacing:2px!important;
  color:var(--mt)!important;display:flex!important;align-items:center!important;gap:10px!important;margin-bottom:10px!important;}
#R .sec::after{content:''!important;flex:1!important;height:1px!important;background:var(--bd)!important;}
#R .tbl{background:var(--s)!important;border:1px solid var(--bd)!important;border-radius:12px!important;overflow:hidden!important;margin-bottom:28px!important;}
#R .thead{display:grid!important;padding:10px 16px!important;background:var(--s2)!important;border-bottom:1px solid var(--bd)!important;}
#R .th{font-size:10px!important;text-transform:uppercase!important;letter-spacing:1.5px!important;color:var(--mt)!important;font-weight:600!important;}
#R .th.r{text-align:right!important;}
#R .trow{display:grid!important;padding:13px 16px!important;border-bottom:1px solid var(--bd)!important;align-items:center!important;transition:background .15s!important;}
#R .trow:last-child{border-bottom:none!important;}
#R .trow:hover{background:rgba(255,255,255,.02)!important;}
#R .trow.t3{background:rgba(224,53,53,.03)!important;}
#R .rnk{font-family:'Bebas Neue',sans-serif!important;font-size:22px!important;color:var(--bd)!important;}
#R .rnk.r1{color:var(--gold)!important;}
#R .rnk.r2{color:var(--silv)!important;}
#R .rnk.r3{color:var(--brnz)!important;}
#R .tn{font-size:14px!important;font-weight:700!important;}
#R .tc{font-size:11px!important;color:var(--mt)!important;margin-top:2px!important;font-style:italic!important;}
#R .sc{text-align:right!important;font-size:13px!important;font-weight:600!important;}
#R .stot{text-align:right!important;font-family:'Bebas Neue',sans-serif!important;font-size:22px!important;color:var(--a)!important;}
#R .stot.r1{color:var(--gold)!important;}
#R .stot.r2{color:var(--silv)!important;}
#R .stot.r3{color:var(--brnz)!important;}

/* ── COMMENTS ── */
#R .ccard{background:var(--s)!important;border:1px solid var(--bd)!important;border-radius:12px!important;padding:16px 18px!important;margin-bottom:10px!important;}
#R .cteam{font-size:13px!important;font-weight:700!important;margin-bottom:10px!important;display:flex!important;align-items:center!important;gap:8px!important;}
#R .cbadge{background:var(--s2)!important;border:1px solid var(--bd)!important;padding:2px 10px!important;border-radius:10px!important;font-size:11px!important;color:var(--mt)!important;}
#R .jcmt{display:flex!important;gap:10px!important;margin-bottom:8px!important;align-items:flex-start!important;}
#R .jcmt:last-child{margin-bottom:0!important;}
#R .jauth{font-size:11px!important;color:var(--a)!important;font-weight:600!important;white-space:nowrap!important;min-width:110px!important;padding-top:2px!important;}
#R .jtxt{font-size:13px!important;line-height:1.5!important;font-style:italic!important;}

/* ── ADMIN ── */
#R .atog{position:fixed!important;bottom:18px!important;right:18px!important;z-index:50!important;
  width:42px!important;height:42px!important;background:var(--s2)!important;border:1px solid var(--bd)!important;
  border-radius:50%!important;color:var(--mt)!important;font-size:17px!important;cursor:pointer!important;
  display:flex!important;align-items:center!important;justify-content:center!important;transition:all .2s!important;}
#R .atog:hover{border-color:var(--a)!important;color:var(--a)!important;}
#R .adm{position:fixed!important;bottom:70px!important;right:18px!important;z-index:50!important;
  background:var(--s)!important;border:1px solid var(--bd)!important;border-radius:14px!important;
  padding:16px!important;width:260px!important;display:none!important;box-shadow:0 20px 60px rgba(0,0,0,.5)!important;}
#R .adm.vis{display:block!important;}
#R .atitle{font-size:10px!important;text-transform:uppercase!important;letter-spacing:2px!important;color:var(--mt)!important;margin-bottom:10px!important;display:block!important;}
#R .arow{display:flex!important;align-items:center!important;justify-content:space-between!important;font-size:12px!important;margin-bottom:7px!important;}
#R .adot{width:7px!important;height:7px!important;border-radius:50%!important;margin-right:7px!important;flex-shrink:0!important;}
#R .arow.dn .adot{background:var(--ok)!important;}
#R .arow.wt .adot{background:var(--bd)!important;}
#R .an{display:flex!important;align-items:center!important;flex:1!important;}
#R .ast{font-size:11px!important;color:var(--mt)!important;}
#R .arow.dn .ast{color:var(--ok)!important;}
#R .pbtn{display:block!important;width:100%!important;background:var(--a)!important;color:#fff!important;
  border-radius:10px!important;padding:10px!important;font-size:13px!important;font-weight:700!important;
  cursor:pointer!important;text-align:center!important;margin-top:8px!important;transition:all .2s!important;}
#R .pbtn:hover{background:#c02020!important;}
#R .pbtn.grey{background:#2a2a3d!important;color:var(--mt)!important;font-size:11px!important;}

/* ── PENDING ── */
#R .pend{text-align:center!important;padding:60px 20px!important;}
#R .pend-ico{
  width:64px!important;height:64px!important;border-radius:50%!important;
  border:2px solid var(--bd)!important;display:flex!important;align-items:center!important;
  justify-content:center!important;margin:0 auto 20px!important;
  font-size:28px!important;color:var(--mt)!important;
}
#R .pend-t{font-family:'Bebas Neue',sans-serif!important;font-size:24px!important;letter-spacing:3px!important;color:var(--mt)!important;margin-bottom:8px!important;display:block!important;}
#R .pend-s{font-size:13px!important;color:var(--mt)!important;line-height:1.6!important;}

/* ── WINNER OVERLAY ── */
#R .wov{position:fixed!important;inset:0!important;z-index:200!important;
  background:rgba(10,10,15,.98)!important;display:none!important;
  align-items:center!important;justify-content:center!important;flex-direction:column!important;text-align:center!important;}
#R .wov.vis{display:flex!important;}
#R .w-crown{
  width:80px!important;height:80px!important;margin-bottom:20px!important;
  animation:pop .5s cubic-bezier(.34,1.56,.64,1) both!important;
}
@keyframes pop{from{opacity:0;transform:scale(0) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
#R .wpl{font-family:'Bebas Neue',sans-serif!important;font-size:14px!important;letter-spacing:8px!important;color:var(--mt)!important;margin-bottom:12px!important;}
#R .wnm{
  font-family:'Bebas Neue',sans-serif!important;font-size:clamp(36px,8vw,80px)!important;letter-spacing:3px!important;
  background:linear-gradient(135deg,var(--gold),#fff5a0,var(--gold))!important;
  -webkit-background-clip:text!important;-webkit-text-fill-color:transparent!important;
  line-height:1!important;margin-bottom:12px!important;
  animation:shimmer 2s linear infinite!important;
  background-size:200%!important;
}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
#R .wsc{font-family:'Bebas Neue',sans-serif!important;font-size:36px!important;color:rgba(255,215,0,.6)!important;margin-bottom:28px!important;}
#R .wcl{
  background:transparent!important;border:1px solid var(--bd)!important;color:var(--mt)!important;
  padding:9px 26px!important;border-radius:10px!important;cursor:pointer!important;font-size:13px!important;
  transition:all .2s!important;
}
#R .wcl:hover{border-color:var(--a)!important;color:var(--a)!important;}

@media(max-width:600px){
  #R .podium-wrap{flex-direction:column!important;align-items:center!important;}
  #R .pod-card{width:100%!important;max-width:300px!important;}
  #R .pod.first .pod-card{width:100%!important;}
  #R .main{padding:16px!important;}
}
</style>
</head>
<body>
<div id="R">
  <div class="bg"></div>

  <!-- LOGO HEADER -->
  <div class="logo-wrap">
    <img class="logo-img" src="https://i.ibb.co/0p0Dk0k8/Chat-GPT-Image-30-2026-23-47-28.png" alt="LAW">
    <span class="logo-sub">Dance Competition · Results</span>
    <div class="hright">
      <div class="live"><div class="ldot"></div>LIVE</div>
      <div class="fsbtn" onclick="toggleFS()">&#x26F6; Fullscreen</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="srow">
      <span class="ntitle" id="ntitle">—</span>
      <div class="jpills" id="jpills"></div>
    </div>
    <div class="crit-info" id="critInfo"></div>
    <div id="content"></div>
  </div>

  <!-- ADMIN -->
  <div class="atog" onclick="toggleAdm()">&#9881;</div>
  <div class="adm" id="adm">
    <span class="atitle">Панель организатора</span>
    <div id="admrows"></div>
    <div class="pbtn" id="pbtn" onclick="publish()">Опубликовать результаты</div>
    <div class="pbtn" onclick="downloadPDF()" style="background:#1c1c2a!important;border:1px solid #2a2a3d!important;margin-top:6px!important;">&#128196; Скачать PDF</div>
    <div class="pbtn grey" onclick="clearAll()" style="margin-top:6px!important;">Сброс данных</div>
  </div>

  <!-- WINNER OVERLAY -->
  <div class="wov" id="wov">
    <svg class="w-crown" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 50 L15 20 L30 38 L40 10 L50 38 L65 20 L75 50 Z" fill="#FFD700" opacity=".9"/>
      <circle cx="5" cy="50" r="5" fill="#FFD700"/>
      <circle cx="40" cy="10" r="5" fill="#FFD700"/>
      <circle cx="75" cy="50" r="5" fill="#FFD700"/>
      <rect x="3" y="52" width="74" height="8" rx="4" fill="#FFD700" opacity=".7"/>
    </svg>
    <div class="wpl">ПОБЕДИТЕЛЬ</div>
    <div class="wnm" id="wnm">—</div>
    <div class="wsc" id="wsc">—</div>
    <div class="wcl" onclick="closeW()">Закрыть</div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA1xkiAfHRKVCQDCmatrWLolEphtgwXOd0",
  authDomain:"kulakovalaw.firebaseapp.com",
  databaseURL:"https://kulakovalaw-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"kulakovalaw",
  storageBucket:"kulakovalaw.firebasestorage.app",
  messagingSenderId:"569728367844",

const db=firebase.database();
db.ref('scores').on('value',    s=>{ window._sc  = s.val()||{}; renderAll(); });

<script>
const C={
  judges:[
    {name:'Деки',          block:1},
    {name:'Полли Оричи',   block:1},
    {name:'Олег Клевакин', block:1},
    {name:'Coco',          block:1},
  ],
  critSolo:[
    {k:'technique',  l:'Техника',       w:.35},
    {k:'musicality', l:'Музыкальность', w:.25},
    {k:'choreo',     l:'Хореография',   w:.35},
    {k:'appearance', l:'Внешний вид',   w:.05},
  ],

function getCrit(nom){return nom.type==='crew'?C.critCrew:C.critSolo;}
function wt(s,nom){return getCrit(nom).reduce((a,c)=>a+(parseFloat(s[c.k])||0)*c.w,0);}

function compute(nomIdx){
  const nom=C.noms[nomIdx];
  const sc=window._sc||{}, sub=window._sub||{};
  const bj=C.judges.map((j,ji)=>({...j,ji})).filter(j=>j.block===nom.block);
  const jDone=bj.map(j=>sub?.[j.ji]?.[nom.id]===true);
  const crit=getCrit(nom);
  const teams=nom.teams.map((team,ti)=>{
    const jScores=[];
    bj.forEach((j,bi)=>{
      if(!jDone[bi])return;
      // Firebase keys are strings — try both string and number
      const nomData=sc?.[j.ji]?.[nom.id];
      const s=nomData?.[ti] ?? nomData?.[String(ti)];
      if(s)jScores.push({w:wt(s,nom),raw:s});
    });
    const avg=jScores.length?jScores.reduce((a,b)=>a+b.w,0)/jScores.length:null;
    const critAvg={};
    crit.forEach(c=>{
      const vs=jScores.map(js=>parseFloat(js.raw[c.k])||0);
      critAvg[c.k]=vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:null;
    });
    const cmts=bj.map((j,bi)=>{
      const nomData=sc?.[j.ji]?.[nom.id];
      const s=nomData?.[ti] ?? nomData?.[String(ti)];
      return{
        judge:j.name,
        text:s?.comment||'',
        done:jDone[bi],
      };
    });
    return{team,ti,avg,critAvg,cmts};
  });
  const sorted=[...teams].filter(t=>t.avg!==null).sort((a,b)=>b.avg-a.avg);
  const unsorted=teams.filter(t=>t.avg===null);
  return{sorted:[...sorted,...unsorted],bj,jDone};
}

function renderTabs(){
  const t=document.getElementById('tabs');t.innerHTML='';
  C.noms.forEach((nom,i)=>{
    const btn=document.createElement('div');
    btn.className='tab'+(i===curNom?' act':'');
    btn.textContent=nom.short;
    btn.onclick=()=>{curNom=i;renderAll();};
    t.appendChild(btn);
  });
}

    </div>`;
    return;
  }

  const cols=`48px 1fr ${crit.map(()=>'76px').join(' ')} 90px`;
  let html='';

  // PODIUM
  const order=[1,0,2]; // silver, gold, bronze — gold in middle
  html+=`<div class="podium-wrap">`;
  order.forEach(rank=>{
    const t=sorted[rank];
    const cls=['first','second','third'][rank];
    const label=['1 место','2 место','3 место'][rank];
    const num=[1,2,3][rank];
    const isEmpty=!t;
    const click=rank===0&&t?`onclick="showW('${(t.team||'').replace(/'/g,"\\'")}','${t.avg?t.avg.toFixed(3):''}')"`:'' ;
    html+=`<div class="pod ${cls}">
      <div class="pod-card" ${click} style="${rank===0?'cursor:pointer':''}">
        <div class="place-badge">${num}</div>
        <div class="pod-name">${isEmpty?'—':t.team}</div>
        <div class="pod-score">${isEmpty||t.avg===null?'—':t.avg.toFixed(3)}</div>
        <span class="pod-lbl">итоговый балл</span>
        <div class="pod-glow"></div>
      </div>
      <div class="platform"><div class="plat-block">${label}</div></div>
    </div>`;
  });
  html+=`</div>`;

  // TABLE
  html+=`<div class="sec">Полная таблица</div>
  <div class="tbl">
    <div class="thead" style="grid-template-columns:${cols}">
      <div class="th">#</div>
      <div class="th">Участник</div>
      ${crit.map(c=>`<div class="th r">${c.l.split(' ')[0]}</div>`).join('')}
      <div class="th r">Итог</div>
    </div>`;
  sorted.forEach((t,rank)=>{
    const r=rank+1;
    const hasCmt=t.cmts.some(c=>c.text&&c.done);
    html+=`<div class="trow${r<=3?' t3':''}" style="grid-template-columns:${cols}">
      <div class="rnk${r<=3?' r'+r:''}">${r}</div>
      <div><div class="tn">${t.team}</div>${hasCmt?'<div class="tc">комментарии судей</div>':''}</div>
      ${crit.map(c=>`<div class="sc">${t.critAvg[c.k]!=null?t.critAvg[c.k].toFixed(2):'—'}</div>`).join('')}
      <div class="stot${r<=3?' r'+r:''}">${t.avg!=null?t.avg.toFixed(3):'—'}</div>
    </div>`;
  });
  html+=`</div>`;

  // COMMENTS
  const hasCmts=sorted.some(t=>t.cmts.some(c=>c.text&&c.done));
  if(hasCmts){
    html+=`<div class="sec">Комментарии судей</div>`;
    sorted.forEach((t,rank)=>{
      if(!t.cmts.some(c=>c.text&&c.done))return;
      html+=`<div class="ccard">
        <div class="cteam">${t.team}<span class="cbadge">${rank+1} место</span></div>
        ${t.cmts.filter(c=>c.done).map(c=>`
          <div class="jcmt">
            <div class="jauth">${c.judge}</div>
            <div class="jtxt">${c.text||'<span style="color:var(--bd)">без комментария</span>'}</div>
          </div>`).join('')}
      </div>`;
    });
  }

  ct.innerHTML=html;
}
